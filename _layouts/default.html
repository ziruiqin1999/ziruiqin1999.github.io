<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {{ site.author.name }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="回到首页">
        <span class="brand-mark">ZQ</span>
        <span>Research Space</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="{{ '/' | relative_url }}#intro">简介</a>
        <a href="{{ '/' | relative_url }}#articles">文章</a>
        <a href="{{ '/' | relative_url }}#essays">随笔</a>
        <a href="{{ '/' | relative_url }}#resume">简历</a>
        <a href="{{ '/' | relative_url }}#contact">联系</a>
      </nav>
    </header>

    {{ content }}

    <footer class="footer">
      <span>© 2026 {{ site.author.name }}. Built as a quiet place for notes, research thoughts and life frames.</span>
      <a href="{{ '/' | relative_url }}">回到首页</a>
    </footer>
  </body>
</html>
