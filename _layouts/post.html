---
layout: default
---

<main class="post-main">
  <article class="post-article">
    <a class="back-link" href="{{ '/' | relative_url }}#articles">← 返回文章列表</a>
    <p class="post-meta">{{ page.date | date: "%Y-%m-%d" }} / {{ page.category }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
    <div class="post-tags">
      {% for tag in page.tags %}
        <span>{{ tag }}</span>
      {% endfor %}
    </div>
    <div class="markdown-body">
      {{ content }}
    </div>
  </article>
</main>
